name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Build
        run: pnpm build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit
        run: pnpm audit --audit-level=high || true
        continue-on-error: true

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  container-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Build bmad-validator image
        run: docker build -f packages/bmad-validator/Dockerfile -t bmad-validator:scan .

      - name: Build contract-checker image
        run: docker build -f packages/contract-checker/Dockerfile -t contract-checker:scan .

      - name: Build gsd-dependency image
        run: docker build -f packages/gsd-dependency/Dockerfile -t gsd-dependency:scan .

      - name: Build farm-monitor image
        run: docker build -f docker/n8n-ha/Dockerfile.farm-monitor -t farm-monitor:scan .

      - name: Trivy scan - bmad-validator
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: bmad-validator:scan
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table

      - name: Trivy scan - contract-checker
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: contract-checker:scan
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table

      - name: Trivy scan - gsd-dependency
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: gsd-dependency:scan
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table

      - name: Trivy scan - farm-monitor
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: farm-monitor:scan
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table
