# Enable mouse mode for scrolling and pane selection
set -g mouse on

# Customize status bar to show CPU and RAM for macOS
set -g status-right-length 100
set -g status-right '#(top -l 1 | awk "/CPU usage/ {print \"CPU: \" \$3 + \$5 \"%\"}") | #(top -l 1 | awk "/PhysMem/ {print \"RAM: \" \$2}") | %Y-%m-%d %H:%M'

# Increase history limit
set -g history-limit 10000

# Better split window bindings
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %
